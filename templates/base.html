<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VET-CARE | Gestión de Citas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">

    <style>
      /* Fuentes y fondo base */
      body {
        background-color: #f4f7f6;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      }
      /* Ajuste para que el contenido no pegue con la navbar */
      .main-container {
        min-height: 80vh;
      }
    </style>
  </head>
  <body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
          <i class="bi bi-heart-pulse-fill text-danger me-2 fs-4"></i>
          <span>VET-CARE</span>
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link px-3" href="/">
                <i class="bi bi-calendar3 me-1"></i> Agenda
              </a>
            </li>
            <li class="nav-item ms-lg-2">
              <a href="/agendar" class="btn btn-primary rounded-pill px-4 shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Nueva Cita
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5 main-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-top py-4 mt-auto">
      <div class="container text-center text
